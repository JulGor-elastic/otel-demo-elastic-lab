name: "OTel Demo — incident postgresql"
enabled: true
description: |
  Demo scenario: scale PostgreSQL to 0 replicas.
  Shared database dependency — errors across cart, checkout, product-catalog, etc.
  Orders stop growing in Elasticsearch. Use reset-lab to restore.
tags:
  - otel-demo
  - demo
  - observability
  - infrastructure
triggers:
  - type: manual
consts:
  github_connector_id: "__GITHUB_HTTP_CONNECTOR_ID__"
  github_owner: "__GITHUB_REPO_OWNER__"
  github_repo: "__GITHUB_REPO_NAME__"
  github_ref: "__GITHUB_REF__"
steps:
  - name: log_start
    type: console
    with:
      message: "Triggering incident-postgresql on lab VM via GitHub Actions"

  - name: dispatch_github_workflow
    type: http
    connector-id: "{{ consts.github_connector_id }}"
    with:
      path: "/repos/{{ consts.github_owner }}/{{ consts.github_repo }}/actions/workflows/demo-scenarios.yml/dispatches"
      method: POST
      headers:
        Accept: application/vnd.github+json
        X-GitHub-Api-Version: "2022-11-28"
        Content-Type: application/json
      body:
        ref: "{{ consts.github_ref }}"
        inputs:
          scenario: incident-postgresql
    on-failure:
      retry:
        max-attempts: 2
        delay: 3s

  - name: log_done
    type: console
    with:
      message: "GitHub workflow dispatched. Correlate DB errors across services in Elastic APM."
